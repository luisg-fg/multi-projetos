<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
    <link rel="icon" type="image/png" href="/public/img/fitaMetrica.png">
    <link rel="stylesheet" href="/public/css/bootstrap.min.css">
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <section class="section-content">
        <div class="form-container">
            <h2>Calculadora IMC</h2>
            <hr>
            <form id="body-form">
                <div class="form-group">
                    <label for="peso">Peso:</label>
                    <input type="text" class="input-peso" oninput="formatFloat(this)" id="peso" name="peso" placeholder="Peso (kg)" maxlength="7" required>
                </div>
                <div class="form-group">
                    <label for="altura">Altura:</label>
                    <input type="text" oninput="formatFloat(this)" id="altura" name="altura" placeholder="Altura (mt)" maxlength="4" required>
                </div>
                <hr class="hr-bottom">
                <div class="form-btn">
                    <input type="text" class="btn-calcular" placeholder="Calcular IMC" onclick="calcIMC()"></input>
                    <input type="text" id="btnLimpar" class="btn-limpar" placeholder="Limpar" onclick="resetForm()"></input>
                </div> 
            </form>
        </div>
        <div class="resultado-calculo">
            <h2 id="textoResultado" class="texto-results">Resultado:</h2>
            <h3 id="resultadoCalculo" class="alert alert alert-warning d-none" role="alert"></h4>
        </div>
        <div id="target" class="container-table">
            <table id="tableIMC">            
                <tr>
                    <th>IMC (kg/m²)</th>
                    <th>Classificação</th>
                </tr>
                    <tbody id="tbbody">
                        <tr id="pesoAbaixoDoNormal"><td>18,4 ou menos</td><td>Abaixo do normal</td></tr>
                        <tr id="pesoNormal"><td>18,5 - 24,9</td><td>Peso normal</td></tr>
                        <tr id="pesoSobrepeso"><td>25,0 - 29,9</td><td>Sobrepeso</td></tr>
                        <tr id="pesoObesidadeI"><td>30,0 - 34,9</td><td>Obesidade grau I</td></tr>
                        <tr id="pesoObesidadeII"><td>35,0 - 39,9</td><td>Obesidade grau II</td></tr>
                        <tr id="pesoObesidadeIII"><td>40,0 ou mais</td><td>Obesidade grau III (mórbida)</td></tr>
                </tbody>    
            </table>
        </div>
    </section>
    <script src="/func/index.js"></script>
</body>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js" integrity="sha384-w1Q4orYjBQndcko6MimVbzY0tgp4pWB4lZ7lr30WKz0vr/aWKhXdBNmNb5D92v7s" crossorigin="anonymous"></script>
</html>
